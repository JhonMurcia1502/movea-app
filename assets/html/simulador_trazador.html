<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Avanzado - Trazador HDO</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #007bff; margin-bottom: 20px; padding-bottom: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; background: #e9ecef; padding: 20px; border-radius: 10px; margin-bottom: 20px; align-items: center; }
        .control-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
        input[type=range] { width: 100%; cursor: pointer; }
        .switch-container { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; font-size: 0.9em;}
        
        .simulation-area { display: flex; gap: 20px; }
        .canvas-container { flex: 0 0 300px; background: linear-gradient(to top, #a1c4fd 0%, #c2e9fb 100%); border-radius: 10px; position: relative; overflow: hidden; border: 1px solid #ccc; }
        #plot { flex: 1; height: 500px; }
        
        .verdict-box { margin-top: 20px; background: #f8f9fa; border-left: 5px solid #6c757d; padding: 15px; border-radius: 5px; font-size: 0.95em; line-height: 1.5; transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin:0;">Laboratorio Interactivo: Dinámica Isotópica y Convección</h2>
            <p style="font-size:0.85em; color:#666;">Ajusta la velocidad del aire suavemente para ver los cambios microfísicos en tiempo real.</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Velocidad de Ascenso (Convección): <span id="val-convection" style="color:#007bff;">0.00</span></label>
                <input type="range" id="convection" min="0" max="2" step="0.01" value="0">
            </div>
            
            <div class="switch-container">
                <input type="checkbox" id="ice-formation" style="width:22px; height:22px;">
                <label style="margin:0;">Habilitar Congelación<br>(Cristales de Hielo)</label>
            </div>

            <div class="control-group">
                <label>Tropopausa: <span id="val-tropo">16.0 km</span></label>
                <input type="range" id="tropo-height" min="14" max="18" step="0.1" value="16">
            </div>
        </div>

        <div class="simulation-area">
            <div class="canvas-container">
                <canvas id="animationCanvas" width="300" height="500"></canvas>
            </div>
            <div id="plot"></div>
        </div>

        <div class="verdict-box" id="verdict">
            <strong>Analizando Masa de Aire...</strong>
        </div>
    </div>

    <script>
        // --- 1. LÓGICA DE LA GRÁFICA (PLOTLY CONTINUO) ---
        let isFirstPlot = true;

        function updatePlot() {
            const conv = parseFloat(document.getElementById('convection').value);
            const ice = document.getElementById('ice-formation').checked;
            const tropo = parseFloat(document.getElementById('tropo-height').value);
            
            // Textos de UI
            let convText = conv < 0.6 ? "Lenta (Subsidencia)" : (conv < 1.4 ? "Moderada (Tormenta)" : "Violenta (Overshooting)");
            document.getElementById('val-convection').innerText = conv.toFixed(2) + " - " + convText;
            document.getElementById('val-tropo').innerText = tropo.toFixed(1) + " km";

            let altitudes = [];
            let deltaD = [];
            
            // Calculo Matemático Continuo
            for (let z = 0; z <= 20; z += 0.2) {
                altitudes.push(z);
                let baseline = -100 - (z * (600 / 16)); // Rayleigh Base
                
                if (z <= tropo) {
                    deltaD.push(baseline);
                } else {
                    let minTropoValue = -100 - (tropo * (600 / 16));
                    
                    // El enriquecimiento es directamente proporcional a la variable continua 'conv'
                    // Si hay hielo, el pico es grande (hasta 400), si no, solo ligera mezcla (50)
                    let enrichment_factor = ice ? 400 : 50;
                    let actual_enrichment = (conv / 2.0) * enrichment_factor;
                    
                    let value = minTropoValue + actual_enrichment * Math.exp(-Math.pow(z - (tropo + 1.2), 2) / 2);
                    deltaD.push(value);
                }
            }

            const trace = { x: deltaD, y: altitudes, mode: 'lines', line: { color: '#007bff', width: 4 }, name: 'Perfil δD' };
            const tropoLine = { x: [-900, 0], y: [tropo, tropo], mode: 'lines', line: { color: '#dc3545', dash: 'dash', width: 2 }, name: 'Tropopausa' };

            const layout = {
                title: 'Huella Isotópica (δD) vs Altitud',
                xaxis: { title: 'δD (‰)', range: [-850, -50] },
                yaxis: { title: 'Altitud (km)', range: [0, 20] },
                shapes: [{ type: 'rect', x0: -900, y0: tropo, x1: 0, y1: 20, fillcolor: 'rgba(220, 220, 220, 0.3)', line: { width: 0 } }],
                margin: { t: 40, b: 40, l: 50, r: 20 },
                datarevision: new Date().getTime() // Fuerza actualización fluida
            };

            if (isFirstPlot) {
                Plotly.newPlot('plot', [trace, tropoLine], layout);
                isFirstPlot = false;
            } else {
                Plotly.react('plot', [trace, tropoLine], layout);
            }

            // --- Veredicto Dinámico ---
            const verdict = document.getElementById('verdict');
            if (conv > 1.4 && ice) {
                verdict.innerHTML = "🔴 <strong>OVERSHOOTING DETECTADO:</strong> El ascenso violento congeló el agua antes de caer. El hielo inyectado sublima en la estratosfera liberando todo el HDO atrapado. (Curva fuertemente enriquecida).";
                verdict.style.borderColor = "#dc3545"; verdict.style.backgroundColor = "#f8d7da";
            } else if (conv <= 1.4 && conv >= 0.5) {
                verdict.innerHTML = "🟡 <strong>CONVECCIÓN MODERADA:</strong> Hay transporte vertical, pero la mayoría del agua logra precipitar. La señal isotópica se mantiene relativamente agotada.";
                verdict.style.borderColor = "#ffc107"; verdict.style.backgroundColor = "#fff3cd";
            } else {
                verdict.innerHTML = "🟢 <strong>CIRCULACIÓN LENTA (BREWER-DOBSON):</strong> Destilación de Rayleigh perfecta. El vapor pierde progresivamente su HDO a medida que asciende lentamente.";
                verdict.style.borderColor = "#28a745"; verdict.style.backgroundColor = "#d4edda";
            }
        }

        // --- 2. MOTOR DE PARTÍCULAS (CANVAS ANIMATION) ---
        const canvas = document.getElementById('animationCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function drawAnimation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const conv = parseFloat(document.getElementById('convection').value);
            const ice = document.getElementById('ice-formation').checked;
            const tropo = parseFloat(document.getElementById('tropo-height').value);

            // Mapear km a píxeles (0km = 500px, 20km = 0px) -> Factor = 25px por km
            const tropoY = 500 - (tropo * 25);
            const isoterma0 = 500 - (5 * 25); // Línea de congelación asumiendo 5km

            // Dibujar Cielos y Zonas
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(0, 0, canvas.width, tropoY); // Estratosfera

            // Línea Tropopausa
            ctx.setLineDash([5, 5]); ctx.strokeStyle = 'red'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, tropoY); ctx.lineTo(canvas.width, tropoY); ctx.stroke();
            ctx.setLineDash([]); ctx.fillStyle = 'red'; ctx.font = "bold 12px Arial";
            ctx.fillText("Tropopausa", 10, tropoY - 5);

            // Generador de Partículas (Más velocidad = más partículas)
            if (Math.random() < (conv * 0.4) + 0.05) {
                particles.push({
                    x: canvas.width / 2 + (Math.random() * 80 - 40),
                    y: 450, // Salen de la nube base
                    // La velocidad inicial depende directamente del slider
                    vy: (Math.random() * 2 + 1) + (conv * 4), 
                    type: 'water',
                    opacity: 1
                });
            }

            // Físicas
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.y -= p.vy;
                p.vy -= 0.06; // Gravedad/Fricción

                // Congelación cruzando la isoterma
                if (p.y < isoterma0 && ice) { p.type = 'ice'; }

                // Qué pasa si llegan a la Tropopausa
                if (p.y <= tropoY) {
                    if (p.type === 'ice') {
                        // Sublimación: se desvanecen en la estratosfera liberando vapor
                        p.opacity -= 0.015; 
                    } else {
                        // Si es agua líquida, es muy pesada, la gravedad la tumba más rápido
                        p.vy -= 0.5; 
                    }
                }

                // Eliminar partículas que caen o se evaporan
                if (p.y > canvas.height || p.opacity <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                // Renderizado
                ctx.globalAlpha = p.opacity;
                if (p.type === 'water') {
                    // Gota de agua
                    ctx.fillStyle = 'blue';
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
                } else {
                    // Cristal de hielo
                    ctx.fillStyle = 'white';
                    ctx.font = "14px Arial";
                    ctx.fillText("❄️", p.x - 7, p.y + 5);
                }
                ctx.globalAlpha = 1.0;
            }

            // Dibujar Nube Base (Troposfera baja)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.arc(150, 480, 60, 0, Math.PI * 2);
            ctx.arc(80, 500, 70, 0, Math.PI * 2);
            ctx.arc(220, 500, 70, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(drawAnimation);
        }

        // --- 3. EVENT LISTENERS ---
        document.getElementById('convection').addEventListener('input', updatePlot);
        document.getElementById('ice-formation').addEventListener('change', updatePlot);
        document.getElementById('tropo-height').addEventListener('input', updatePlot);

        // Inicializar todo
        updatePlot();
        drawAnimation();
    </script>
</body>
</html>
